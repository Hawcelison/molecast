{% extends "base.html" %}

{% block frontend_config %}
<script>
  window.MOLECAST_CONFIG = {{ frontend_config | tojson }};
</script>
{% endblock %}

{% block content %}
<main id="dashboard">
  <div id="alert-banner-container" class="alert-banner-container" role="list" aria-live="polite"></div>
  <h1>Molecast</h1>
  <section id="current-conditions"></section>
  <section id="forecast"></section>
  <section id="map-panel">
    <div id="map" aria-label="Weather map"></div>
  </section>
  <section id="radar"></section>
  <footer class="app-footer">
    <a href="/test-alerts">Test Alert Editor</a>
  </footer>
</main>
{% endblock %}
