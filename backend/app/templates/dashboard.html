{% extends "base.html" %}

{% block frontend_config %}
<script>
  window.MOLECAST_CONFIG = {{ frontend_config | tojson }};
</script>
{% endblock %}

{% block page_scripts %}
<script src="/static/js/modules/settings-store.js" defer></script>
<script src="/static/js/modules/alerts-api.js" defer></script>
<script src="/static/js/modules/alert-icons.js" defer></script>
<script src="/static/js/modules/alert-flash.js" defer></script>
<script src="/static/js/modules/alert-audio.js" defer></script>
<script src="/static/js/modules/alert-banners.js?v=desktop-alert-tray-20260429" defer></script>
{% endblock %}

{% block content %}
<main id="dashboard">
  <div id="alert-controls" class="alert-controls" aria-label="Alert controls"></div>
  <div id="alert-banner-container" class="alert-banner-container" role="list" aria-live="polite"></div>
  <h1>Molecast</h1>
  <section id="current-conditions"></section>
  <section id="forecast"></section>
  <section id="map-panel">
    <div id="map" aria-label="Weather map"></div>
  </section>
  <section id="radar"></section>
  <footer class="app-footer">
    <a href="/test-alerts">Test Alert Editor</a>
  </footer>
</main>
{% endblock %}
